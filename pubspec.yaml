name: adaptive_dashboard_shell
description: >-
  Adaptive dashboard shell — a collapsible, shadcn-style sidebar rail on desktop
  and tablet that switches to a bottom navigation bar on mobile, wrapping your
  routed content. Presentational and router-agnostic, with zero third-party
  dependencies.
